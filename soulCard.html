<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>灵魂人设卡片｜灵魂渡</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"思源宋体",serif;}
body.dark{background:#0c101c;color:#e8edf7;}
body.light{background:#f7f9ff;color:#222940;}
.star{position:fixed;pointer-events:none;animation:starFloat 12s linear infinite;opacity:0.6;z-index:-1;}
@keyframes starFloat{
0%{transform:translateY(100vh) rotate(0deg);opacity:0;}
15%{opacity:1;}
85%{opacity:1;}
100%{transform:translateY(-10vh) rotate(360deg);opacity:0;}
}
.soul-title{
font-size:34px;font-weight:300;letter-spacing:5px;
color:#fff;
text-shadow:0 0 6px #a8b8ff,0 0 12px #839cff;
}
.broad{width:100%;height:36px;background:#b8c8ff;line-height:36px;overflow:hidden;}
.broad-text{white-space:nowrap;animation:broadRun 24s linear infinite;color:#0c101c;font-size:15px;}
@keyframes broadRun{0%{transform:translateX(100%);}100%{transform:translateX(-100%);}}
nav{width:100%;background:rgba(20,26,44,0.75);padding:16px 0;text-align:center;border-bottom:1px solid #839cff60;backdrop-filter:blur(6px);}
nav a{color:#d0daff;text-decoration:none;margin:0 14px;padding:9px 16px;border-radius:26px;transition:0.4s;font-size:16px;}
nav a:hover{background:#839cff;color:#0c101c;box-shadow:0 0 14px #839cff70;}
.box{width:92%;max-width:1250px;margin:32px auto;padding:28px;border-radius:20px;border:1px solid #839cff40;background:rgba(30,38,60,0.4);box-shadow:0 0 30px #627fff20;backdrop-filter:blur(4px);}
.box h2{margin-bottom:22px;color:#a8b8ff;border-left:4px solid #839cff;padding-left:12px;font-weight:400;}
input,textarea{width:100%;padding:12px;margin:10px 0;border-radius:10px;border:1px solid #839cff;background:rgba(12,16,28,0.7);color:#e8edf7;font-size:16px;}
.btn{display:inline-block;padding:11px 24px;background:linear-gradient(45deg,#839cff,#627fff);color:#0c101c;border:none;border-radius:32px;font-weight:500;cursor:pointer;margin:10px;transition:0.35s;font-size:15px;}
.btn:hover{transform:scale(1.04);box-shadow:0 0 18px #839cff80;}
.theme-switch{position:fixed;top:18px;right:20px;z-index:999;}
footer{margin-top:60px;padding:24px;text-align:center;color:#949fc7;font-size:14px;border-top:1px solid #839cff25;}
</style>
</head>
<body class="dark">
<div class="theme-switch">
<button class="btn" onclick="toggleTheme()">切换静谧/温柔模式</button>
</div>
<div class="broad">
<div class="broad-text">灵魂人设卡｜自定义昵称、性格、执念、爱好、治愈短句｜一键生成朋友圈长图</div>
</div>
<div style="text-align:center;margin:30px 0;">
<h1 class="soul-title">灵魂人设卡片生成器</h1>
<p style="color:#c0ccff;margin-top:10px;letter-spacing:2px;">一张卡片，读懂你的内心</p>
</div>
<nav>
<a href="index.html">首页</a>
<a href="soulWords.html">灵魂语录</a>
<a href="soulPic.html">治愈壁纸图库</a>
<a href="meditation.html">冥想轻音乐</a>

<a href="soulCard.html">灵魂人设卡片</a>
<a href="matchSoul.html">氛围感好物</a>
</nav>
<div class="box">
<h2>填写你的灵魂信息</h2>
<input type="text" id="cardName" placeholder="灵魂昵称">
<input type="text" id="cardChar" placeholder="内在性格（温柔敏感/慢热自愈等）">
<input type="text" id="cardMind" placeholder="心中执念/放不下的事">
<input type="text" id="cardLove" placeholder="自愈爱好（听歌、看晚霞、独处）">
<textarea id="cardSentence" rows="3" placeholder="专属治愈短句"></textarea>
<button class="btn" onclick="makeSoulCard()">生成灵魂人设卡</button>
</div>
<footer>灵魂渡治愈小站 © 2026</footer>
<canvas id="soulCanvas" style="display:none;"></canvas>
<script>
function makeSoulCard(){
    const name = document.getElementById("cardName").value || "无名旅人";
    const char = document.getElementById("cardChar").value || "温柔自愈，向内生长";
    const mind = document.getElementById("cardMind").value || "学会放下，与过往和解";
    const love = document.getElementById("cardLove").value || "晚风、星空、轻音乐";
    const sentence = document.getElementById("cardSentence").value || "允许一切发生，接纳全部自己";

    const canvas = document.getElementById("soulCanvas");
    canvas.width = 750;
    canvas.height = 1334;
    const ctx = canvas.getContext("2d");
    // 渐变星空底色
    const grad = ctx.createLinearGradient(0,0,750,1334);
    grad.addColorStop(0,"#0c101c");
    grad.addColorStop(0.6,"#324278");
    grad.addColorStop(1,"#839cff");
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,750,1334);

    ctx.textAlign = "center";
    // 昵称
    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 48px 思源宋体";
    ctx.fillText(name, 375, 420);

    // 性格
    ctx.fillStyle = "#c0ccff";
    ctx.font = "28px 思源宋体";
    ctx.fillText("内在性格：" + char, 375, 500);

    // 执念
    ctx.fillStyle = "#e8edf7";
    ctx.font = "26px 思源宋体";
    ctx.fillText("心中执念：" + mind, 375, 580);

    // 爱好
    ctx.fillStyle = "#c0ccff";
    ctx.font = "26px 思源宋体";
    ctx.fillText("自愈喜好：" + love, 375, 660);

    // 治愈短句自动换行
    ctx.fillStyle = "#fff";
    ctx.font = "30px 思源宋体";
    let line = "";
    let y = 780;
    for(let c of sentence){
        let test = line + c;
        if(ctx.measureText(test).width > 660){
            ctx.fillText(line,375,y);
            line = c;
            y += 44;
        }else line = test;
    }
    ctx.fillText(line,375,y);

    // 底部落款
    ctx.font = "22px 思源宋体";
    ctx.fillStyle = "#a8b8ff";
    ctx.fillText("灵魂渡 · 专属心灵名片",375,1250);

    // 下载图片
    const a = document.createElement("a");
    a.download = "灵魂人设卡片.png";
    a.href = canvas.toDataURL("image/png");
    a.click();
}

// 星光粒子
function createStar(){
const star = document.createElement('div');
star.className = 'star';
star.innerHTML = '✦';
star.style.left = Math.random()*100+'vw';
star.style.fontSize = Math.random()*18+6+'px';
star.style.color = ['#a8b8ff','#d0daff','#fff'][Math.floor(Math.random()*3)];
document.body.appendChild(star);
setTimeout(()=>star.remove(),12000);
}
setInterval(createStar,400);
function toggleTheme(){
document.body.classList.toggle('dark');
document.body.classList.toggle('light');
}
window.onload = function(){
let saveBg = localStorage.getItem("soulGlobalBg");
if(saveBg){
document.body.style.backgroundImage = `url(${saveBg})`;
document.body.style.backgroundSize = "cover";
document.body.style.backgroundAttachment = "fixed";
document.body.style.backgroundRepeat = "no-repeat";
}
}
</script>
</body>
</html>
