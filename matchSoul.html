<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>氛围感治愈好物｜灵魂渡</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"思源宋体",serif;}
body.dark{background:#0c101c;color:#e8edf7;}
body.light{background:#f7f9ff;color:#222940;}
.star{position:fixed;pointer-events:none;animation:starFloat 12s linear infinite;opacity:0.6;z-index:-1;}
@keyframes starFloat{
0%{transform:translateY(100vh) rotate(0deg);opacity:0;}
15%{opacity:1;}
85%{opacity:1;}
100%{transform:translateY(-10vh) rotate(360deg);opacity:0;}
}
.soul-title{
font-size:34px;font-weight:300;letter-spacing:5px;
color:#fff;
text-shadow:0 0 6px #a8b8ff,0 0 12px #839cff;
}
.broad{width:100%;height:36px;background:#b8c8ff;line-height:36px;overflow:hidden;}
.broad-text{white-space:nowrap;animation:broadRun 24s linear infinite;color:#0c101c;font-size:15px;}
@keyframes broadRun{0%{transform:translateX(100%);}100%{transform:translateX(-100%);}}
nav{width:100%;background:rgba(20,26,44,0.75);padding:16px 0;text-align:center;border-bottom:1px solid #839cff60;backdrop-filter:blur(6px);}
nav a{color:#d0daff;text-decoration:none;margin:0 14px;padding:9px 16px;border-radius:26px;transition:0.4s;font-size:16px;}
nav a:hover{background:#839cff;color:#0c101c;box-shadow:0 0 14px #839cff70;}
.box{width:92%;max-width:1250px;margin:32px auto;padding:28px;border-radius:20px;border:1px solid #839cff40;background:rgba(30,38,60,0.4);box-shadow:0 0 30px #627fff20;backdrop-filter:blur(4px);}
.box h2{margin-bottom:22px;color:#a8b8ff;border-left:4px solid #839cff;padding-left:12px;font-weight:400;}
.good-card{background:rgba(10,14,30,0.5);padding:20px;border-radius:14px;margin-bottom:24px;border:1px solid #839cff30;}
.good-card img{width:100%;height:270px;object-fit:cover;border-radius:12px;margin-bottom:15px;}
.good-title{color:#a8b8ff;font-size:22px;margin-bottom:10px;}
.good-desc{color:#d0daff;line-height:1.8;margin-bottom:15px;}
.btn{display:inline-block;padding:11px 24px;background:linear-gradient(45deg,#839cff,#627fff);color:#0c101c;border:none;border-radius:32px;font-weight:500;cursor:pointer;margin:10px;transition:0.35s;font-size:15px;}
.btn:hover{transform:scale(1.04);box-shadow:0 0 18px #839cff80;}
.theme-switch{position:fixed;top:18px;right:20px;z-index:999;}
footer{margin-top:60px;padding:24px;text-align:center;color:#949fc7;font-size:14px;border-top:1px solid #839cff25;}
</style>
</head>
<body class="dark">
<div class="theme-switch">
<button class="btn" onclick="toggleTheme()">切换静谧/温柔模式</button>
</div>
<div class="broad">
<div class="broad-text">氛围感治愈好物｜星空灯、香薰、白噪音耳机、治愈书籍｜点击跳转同款商品页面</div>
</div>
<div style="text-align:center;margin:30px 0;">
<h1 class="soul-title">心灵氛围感好物</h1>
<p style="color:#c0ccff;margin-top:10px;letter-spacing:2px;">用温柔好物，治愈疲惫日常</p>
</div>
<nav>
<a href="index.html">首页</a>
<a href="soulWords.html">灵魂语录</a>
<a href="soulPic.html">治愈壁纸图库</a>

<a href="treeHole.html">情绪树洞</a>
<a href="selfHeal.html">自愈图文投稿</a>
<a href="materialSoul.html">动态背景素材</a>
<a href="photoEdit.html">柔光图片修图</a>
<a href="soulCard.html">灵魂人设卡片</a>
<a href="matchSoul.html">氛围感好物</a>
</nav>
<div class="box">
<h2>治愈好物推荐</h2>
<div id="goodListBox"></div>
</div>
<footer>灵魂渡治愈小站 © 2026 | 商品链接跳转第三方平台，仅供参考</footer>
<script>
const goodsData = [
    {
        img:"https://picsum.photos/id/1043/1200/400",
        title:"星空投影氛围灯",
        desc:"夜晚投射整片星空，关灯独处，缓解焦虑失眠，氛围感拉满。",
        link:"https://www.taobao.com"
    },
    {
        img:"https://picsum.photos/id/1019/1200/400",
        title:"淡香安神香薰蜡烛",
        desc:"木质调淡香，看书、冥想、睡前使用，抚平内心浮躁情绪。",
        link:"https://www.taobao.com"
    },
    {
        img:"https://picsum.photos/id/1068/1200/400",
        title:"降噪白噪音耳机",
        desc隔绝外界嘈杂，听雨、冥想、独处专用，沉浸式放松心灵。
        link:"https://www.taobao.com"
    },
    {
        img:"https://picsum.photos/id/1036/1200/400",
        title:"心灵自愈治愈书籍套装",
        desc:"关于情绪内耗、自我接纳、与自己和解的温柔文字读物。",
        link:"https://www.taobao.com"
    }
];

function renderGoods(){
    const box = document.getElementById("goodListBox");
    box.innerHTML = "";
    goodsData.forEach(item=>{
        const div = document.createElement("div");
        div.className = "good-card";
        div.innerHTML = `
            <img src="${item.img}" alt="${item.title}">
            <h3 class="good-title">${item.title}</h3>
            <p class="good-desc">${item.desc}</p>
            <a href="${item.link}" target="_blank" class="btn">查看同款好物</a>
        `;
        box.appendChild(div);
    })
}

// 星光粒子
function createStar(){
const star = document.createElement('div');
star.className = 'star';
star.innerHTML = '✦';
star.style.left = Math.random()*100+'vw';
star.style.fontSize = Math.random()*18+6+'px';
star.style.color = ['#a8b8ff','#d0daff','#fff'][Math.floor(Math.random()*3)];
document.body.appendChild(star);
setTimeout(()=>star.remove(),12000);
}
setInterval(createStar,400);
function toggleTheme(){
document.body.classList.toggle('dark');
document.body.classList.toggle('light');
}
window.onload = function(){
renderGoods();
let saveBg = localStorage.getItem("soulGlobalBg");
if(saveBg){
document.body.style.backgroundImage = `url(${saveBg})`;
document.body.style.backgroundSize = "cover";
document.body.style.backgroundAttachment = "fixed";
document.body.style.backgroundRepeat = "no-repeat";
}
}
</script>
</body>
</html>
