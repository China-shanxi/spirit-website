<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>治愈壁纸图库｜灵魂渡</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"思源宋体",serif;}
body.dark{background:#0c101c;color:#e8edf7;}
body.light{background:#f7f9ff;color:#222940;}
.star{position:fixed;pointer-events:none;animation:starFloat 12s linear infinite;opacity:0.6;z-index:-1;}
@keyframes starFloat{
0%{transform:translateY(100vh) rotate(0deg);opacity:0;}
15%{opacity:1;}
85%{opacity:1;}
100%{transform:translateY(-10vh) rotate(360deg);opacity:0;}
}
.soul-title{
font-size:34px;font-weight:300;letter-spacing:5px;
color:#fff;
text-shadow:0 0 6px #a8b8ff,0 0 12px #839cff;
}
.broad{width:100%;height:36px;background:#b8c8ff;line-height:36px;overflow:hidden;}
.broad-text{white-space:nowrap;animation:broadRun 24s linear infinite;color:#0c101c;font-size:15px;}
@keyframes broadRun{0%{transform:translateX(100%);}100%{transform:translateX(-100%);}}
nav{width:100%;background:rgba(20,26,44,0.75);padding:16px 0;text-align:center;border-bottom:1px solid #839cff60;backdrop-filter:blur(6px);}
nav a{color:#d0daff;text-decoration:none;margin:0 14px;padding:9px 16px;border-radius:26px;transition:0.4s;font-size:16px;}
nav a:hover{background:#839cff;color:#0c101c;box-shadow:0 0 14px #839cff70;}
.box{width:92%;max-width:1250px;margin:32px auto;padding:28px;border-radius:20px;border:1px solid #839cff40;background:rgba(30,38,60,0.4);box-shadow:0 0 30px #627fff20;backdrop-filter:blur(4px);}
.box h2{margin-bottom:22px;color:#a8b8ff;border-left:4px solid #839cff;padding-left:12px;font-weight:400;}
.pic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:22px;}
.pic-card{background:rgba(10,14,30,0.5);padding:16px;border-radius:14px;text-align:center;border:1px solid #839cff30;}
.pic-card img{width:100%;height:170px;object-fit:cover;border-radius:12px;cursor:pointer;}
.btn{display:inline-block;padding:11px 24px;background:linear-gradient(45deg,#839cff,#627fff);color:#0c101c;border:none;border-radius:32px;font-weight:500;cursor:pointer;margin:10px;transition:0.35s;font-size:15px;}
.btn:hover{transform:scale(1.04);box-shadow:0 0 18px #839cff80;}
.theme-switch{position:fixed;top:18px;right:20px;z-index:999;}
footer{margin-top:60px;padding:24px;text-align:center;color:#949fc7;font-size:14px;border-top:1px solid #839cff25;}
</style>
</head>
<body class="dark">
<div class="theme-switch">
<button class="btn" onclick="toggleTheme()">切换静谧/温柔模式</button>
</div>
<div class="broad">
<div class="broad-text">治愈壁纸图库｜星空/晚风/薄雾｜单图保存｜一键生成朋友圈氛围感配图</div>
</div>
<div style="text-align:center;margin:30px 0;">
<h1 class="soul-title">治愈壁纸图库</h1>
<p style="color:#c0ccff;margin-top:10px;letter-spacing:2px;">把温柔风景存进手机，安抚疲惫灵魂</p>
</div>

</nav>
<div class="box">
<h2>精选治愈风景壁纸</h2>
<div class="pic-grid" id="picBox"></div>
</div>
<div class="box">
<h2>壁纸工具</h2>
<button class="btn" onclick="refreshPic()">随机更换一批壁纸</button>
<button class="btn" onclick="makePicPoster()">生成朋友圈配图</button>
</div>
<footer>灵魂渡治愈小站 © 2026</footer>
<canvas id="picPosterCanvas" style="display:none;"></canvas>
<script>
const picList = [
"https://picsum.photos/id/1019/300/300",
"https://picsum.photos/id/1036/300/300",
"https://picsum.photos/id/1043/300/300",
"https://picsum.photos/id/1068/300/300",
"https://picsum.photos/id/1023/300/300",
"https://picsum.photos/id/1048/300/300",
"https://picsum.photos/id/1056/300/300",
"https://picsum.photos/id/1070/300/300",
"https://picsum.photos/id/1014/300/300",
"https://picsum.photos/id/1031/300/300",
"https://picsum.photos/id/1051/300/300",
"https://picsum.photos/id/1064/300/300"
];
let selectImgUrl = "";
// 渲染壁纸
function renderPic(){
let box = document.getElementById("picBox");
box.innerHTML = "";
picList.forEach((src,i)=>{
let card = document.createElement("div");
card.className = "pic-card";
card.innerHTML = `
<img src="${src}" onclick="selectPic(${i})">
<p style="color:#c0ccff;margin:10px 0;">治愈壁纸 ${i+1}</p>
<button class="btn" onclick="savePic(${i})">保存原图</button>
`;
box.appendChild(card);
})
}
// 随机刷新壁纸
function refreshPic(){
picList.push(picList.shift());
renderPic();
}
// 选中壁纸
function selectPic(i){
selectImgUrl = picList[i];
alert("已选中壁纸 #"+(i+1));
}
// 下载原图
function savePic(i){
let a = document.createElement("a");
a.href = picList[i];
a.download = "治愈壁纸.jpg";
a.click();
}
// 生成朋友圈配图海报
function makePicPoster(){
if(!selectImgUrl) return alert("请先点击选中一张壁纸");
let canvas = document.getElementById("picPosterCanvas");
canvas.width = 750;canvas.height = 1334;
let ctx = canvas.getContext("2d");
// 渐变底层
let grad = ctx.createLinearGradient(0,0,750,1334);
grad.addColorStop(0,"#0c101c");
grad.addColorStop(1,"#839cff");
ctx.fillStyle = grad;
ctx.fillRect(0,0,750,1334);
let img = new Image();
img.crossOrigin = "anonymous";
img.src = selectImgUrl;
img.onload = function(){
// 居中绘制图片
ctx.drawImage(img,125,300,500,500);
ctx.fillStyle = "#e8edf7";
ctx.font = "bold 36px 思源宋体";
ctx.textAlign = "center";
ctx.fillText("治愈风景 · 安抚灵魂",375,860);
ctx.font = "24px 思源宋体";
ctx.fillStyle = "#c0ccff";
ctx.fillText("灵魂渡心灵小站",375,920);
// 下载
let a = document.createElement("a");
a.download = "壁纸朋友圈配图.png";
a.href = canvas.toDataURL("image/png");
a.click();
}
}
// 星光粒子
function createStar(){
const star = document.createElement('div');
star.className = 'star';
star.innerHTML = '✦';
star.style.left = Math.random()*100+'vw';
star.style.fontSize = Math.random()*18+6+'px';
star.style.color = ['#a8b8ff','#d0daff','#fff'][Math.floor(Math.random()*3)];
document.body.appendChild(star);
setTimeout(()=>star.remove(),12000);
}
setInterval(createStar,400);
// 主题切换
function toggleTheme(){
document.body.classList.toggle('dark');
document.body.classList.toggle('light');
}
window.onload = function(){
renderPic();
let saveBg = localStorage.getItem("soulGlobalBg");
if(saveBg){
document.body.style.backgroundImage = `url(${saveBg})`;
document.body.style.backgroundSize = "cover";
document.body.style.backgroundAttachment = "fixed";
document.body.style.backgroundRepeat = "no-repeat";
}
}
</script>
</body>
</html>
