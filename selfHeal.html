<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自愈图文投稿｜灵魂渡</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"思源宋体",serif;}
body.dark{background:#0c101c;color:#e8edf7;}
body.light{background:#f7f9ff;color:#222940;}
.star{position:fixed;pointer-events:none;animation:starFloat 12s linear infinite;opacity:0.6;z-index:-1;}
@keyframes starFloat{
0%{transform:translateY(100vh) rotate(0deg);opacity:0;}
15%{opacity:1;}
85%{opacity:1;}
100%{transform:translateY(-10vh) rotate(360deg);opacity:0;}
}
.soul-title{
font-size:34px;font-weight:300;letter-spacing:5px;
color:#fff;
text-shadow:0 0 6px #a8b8ff,0 0 12px #839cff;
}
.broad{width:100%;height:36px;background:#b8c8ff;line-height:36px;overflow:hidden;}
.broad-text{white-space:nowrap;animation:broadRun 24s linear infinite;color:#0c101c;font-size:15px;}
@keyframes broadRun{0%{transform:translateX(100%);}100%{transform:translateX(-100%);}}
nav{width:100%;background:rgba(20,26,44,0.75);padding:16px 0;text-align:center;border-bottom:1px solid #839cff60;backdrop-filter:blur(6px);}
nav a{color:#d0daff;text-decoration:none;margin:0 14px;padding:9px 16px;border-radius:26px;transition:0.4s;font-size:16px;}
nav a:hover{background:#839cff;color:#0c101c;box-shadow:0 0 14px #839cff70;}
.box{width:92%;max-width:1250px;margin:32px auto;padding:28px;border-radius:20px;border:1px solid #839cff40;background:rgba(30,38,60,0.4);box-shadow:0 0 30px #627fff20;backdrop-filter:blur(4px);}
.box h2{margin-bottom:22px;color:#a8b8ff;border-left:4px solid #839cff;padding-left:12px;font-weight:400;}
.btn{display:inline-block;padding:11px 24px;background:linear-gradient(45deg,#839cff,#627fff);color:#0c101c;border:none;border-radius:32px;font-weight:500;cursor:pointer;margin:10px;transition:0.35s;font-size:15px;}
.btn:hover{transform:scale(1.04);box-shadow:0 0 18px #839cff80;}
.theme-switch{position:fixed;top:18px;right:20px;z-index:999;}
input,textarea{width:100%;padding:12px;margin:10px 0;border-radius:10px;border:1px solid #839cff;background:rgba(12,16,28,0.7);color:#e8edf7;font-size:16px;}
#previewImg{max-width:320px;border-radius:14px;margin:15px 0;}
footer{margin-top:60px;padding:24px;text-align:center;color:#949fc7;font-size:14px;border-top:1px solid #839cff25;}
</style>
</head>
<body class="dark">
<div class="theme-switch">
<button class="btn" onclick="toggleTheme()">切换静谧/温柔模式</button>
</div>
<div class="broad">
<div class="broad-text">自愈图文投稿｜上传治愈照片｜填写自愈心得｜一键生成分享卡片保存本地</div>
</div>
<div style="text-align:center;margin:30px 0;">
<h1 class="soul-title">自愈图文投稿</h1>
<p style="color:#c0ccff;margin-top:10px;letter-spacing:2px;">记录与自己和解的温柔瞬间</p>
</div>
<nav>

<a href="soulWords.html">灵魂语录</a>

</nav>
<div class="box">
<h2>上传自愈图片</h2>
<input type="file" id="imgUpload" accept="image/*">
<div id="previewImg"></div>
<h2>填写自愈记录</h2>
<input type="text" id="healName" placeholder="你的昵称">
<input type="text" id="healTag" placeholder="情绪标签（如：失眠自愈、放下执念）">
<textarea id="healText" rows="5" placeholder="写下这段自愈的感受与心得..."></textarea>
<button class="btn" onclick="createHealCard()">生成自愈分享卡片</button>
</div>
<footer>灵魂渡治愈小站 © 2026</footer>
<canvas id="healCanvas" style="display:none;"></canvas>
<script>
let uploadImgSrc = null;
// 图片预览
document.getElementById("imgUpload").addEventListener("change",function(e){
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev=>{
        uploadImgSrc = ev.target.result;
        document.getElementById("previewImg").innerHTML = `<img src="${uploadImgSrc}" style="max-width:320px;border-radius:14px;">`;
    }
    reader.readAsDataURL(file);
})
// 生成自愈卡片
function createHealCard(){
    if(!uploadImgSrc){
        alert("请先上传一张自愈图片");
        return;
    }
    const name = document.getElementById("healName").value || "自愈旅人";
    const tag = document.getElementById("healTag").value || "心灵自愈";
    const text = document.getElementById("healText").value || "慢慢与自己和解，一切都会好起来";
    const canvas = document.getElementById("healCanvas");
    canvas.width = 750;canvas.height = 1334;
    const ctx = canvas.getContext("2d");
    // 渐变背景
    const grad = ctx.createLinearGradient(0,0,750,1334);
    grad.addColorStop(0,"#0c101c");
    grad.addColorStop(1,"#839cff");
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,750,1334);
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.src = uploadImgSrc;
    img.onload = function(){
        ctx.drawImage(img,150,280,450,420);
        // 文字
        ctx.textAlign = "center";
        ctx.fillStyle = "#e8edf7";
        ctx.font = "bold 36px 思源宋体";
        ctx.fillText(name,375,750);
        ctx.fillStyle = "#a8b8ff";
        ctx.font = "26px 思源宋体";
        ctx.fillText("#"+tag,375,800);
        ctx.fillStyle = "#d0daff";
        ctx.font = "22px 思源宋体";
        let line = "";
        let y = 870;
        for(let c of text){
            let test = line + c;
            if(ctx.measureText(test).width > 640){
                ctx.fillText(line,375,y);
                line = c;
                y += 42;
            }else line = test;
        }
        ctx.fillText(line,375,y);
        ctx.font = "22px 思源宋体";
        ctx.fillStyle = "#c0ccff";
        ctx.fillText("灵魂渡 · 自愈记录",375,1240);
        // 下载
        const a = document.createElement("a");
        a.download = "自愈分享卡片.png";
        a.href = canvas.toDataURL("image/png");
        a.click();
    }
}

// 星光粒子
function createStar(){
const star = document.createElement('div');
star.className = 'star';
star.innerHTML = '✦';
star.style.left = Math.random()*100+'vw';
star.style.fontSize = Math.random()*18+6+'px';
star.style.color = ['#a8b8ff','#d0daff','#fff'][Math.floor(Math.random()*3)];
document.body.appendChild(star);
setTimeout(()=>star.remove(),12000);
}
setInterval(createStar,400);
function toggleTheme(){
document.body.classList.toggle('dark');
document.body.classList.toggle('light');
}
window.onload = function(){
let saveBg = localStorage.getItem("soulGlobalBg");
if(saveBg){
document.body.style.backgroundImage = `url(${saveBg})`;
document.body.style.backgroundSize = "cover";
document.body.style.backgroundAttachment = "fixed";
document.body.style.backgroundRepeat = "no-repeat";
}
}
</script>
</body>
</html>
