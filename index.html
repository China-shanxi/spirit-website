<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"思源宋体",serif;}
/* 双主题样式 */
body.dark{background:#0c101c;color:#e8edf7;}
body.light{background:#f7f9ff;color:#222940;}
/* 漂浮星光粒子 */
.star{position:fixed;pointer-events:none;animation:starFloat 12s linear infinite;opacity:0.6;z-index:-1;}
@keyframes starFloat{
0%{transform:translateY(100vh) rotate(0deg);opacity:0;}
15%{opacity:1;}
85%{opacity:1;}
100%{transform:translateY(-10vh) rotate(360deg);opacity:0;}
}
/* 微光霓虹标题 */
.soul-title{
font-size:38px;font-weight:300;letter-spacing:6px;
color:#fff;
text-shadow:
0 0 6px #a8b8ff,
0 0 12px #839cff,
0 0 24px #627fff;
animation:softFlash 3s ease-in-out infinite alternate;
}
@keyframes softFlash{0%{opacity:0.75;}100%{opacity:1;}}
/* 顶部滚动公告 */
.broad{width:100%;height:36px;background:#b8c8ff;line-height:36px;overflow:hidden;}
.broad-text{white-space:nowrap;animation:broadRun 24s linear infinite;color:#0c101c;font-size:15px;}
@keyframes broadRun{0%{transform:translateX(100%);}100%{transform:translateX(-100%);}}
/* 导航栏 */
nav{width:100%;background:rgba(20,26,44,0.75);padding:16px 0;text-align:center;border-bottom:1px solid #839cff60;backdrop-filter:blur(6px);}
nav a{color:#d0daff;text-decoration:none;margin:0 14px;padding:9px 16px;border-radius:26px;transition:0.4s;font-size:16px;}
nav a:hover{background:#839cff;color:#0c101c;box-shadow:0 0 14px #839cff70;}
/* 内容容器 */
.box{width:92%;max-width:1250px;margin:32px auto;padding:28px;border-radius:20px;border:1px solid #839cff40;background:rgba(30,38,60,0.4);box-shadow:0 0 30px #627fff20;backdrop-filter:blur(4px);}
.box h2{margin-bottom:22px;color:#a8b8ff;border-left:4px solid #839cff;padding-left:12px;font-weight:400;}
/* 轮播治愈图 */
.banner{width:100%;height:340px;border-radius:14px;overflow:hidden;margin:24px 0;position:relative;}
.banner-wrap{display:flex;width:400%;animation:bannerLoop 24s linear infinite;}
.banner-wrap img{width:100%;height:340px;object-fit:cover;}
@keyframes bannerLoop{0%{transform:translateX(0);}100%{transform:translateX(-300%);}}
/* 按钮通用 */
.btn{display:inline-block;padding:11px 24px;background:linear-gradient(45deg,#839cff,#627fff);color:#0c101c;border:none;border-radius:32px;font-weight:500;cursor:pointer;margin:10px;transition:0.35s;font-size:15px;}
.btn:hover{transform:scale(1.04);box-shadow:0 0 18px #839cff80;}
/* 主题切换按钮 */
.theme-switch{position:fixed;top:18px;right:20px;z-index:999;}
/* 访客统计文字 */
.visit-num{color:#c0ccff;margin-top:12px;font-size:15px;letter-spacing:1px;}
/* 悬浮迷你播放器 */
.mini-audio{position:fixed;bottom:24px;right:24px;background:rgba(12,16,28,0.85);padding:14px;border-radius:50px;border:1px solid #839cff;z-index:998;backdrop-filter:blur(5px);}
footer{margin-top:60px;padding:24px;text-align:center;color:#949fc7;font-size:14px;border-top:1px solid #839cff25;}
</style>

<!-- 隐藏画布：生成海报 -->
<canvas id="wordCanvas" style="display:none;"></canvas>
<script>
// 1. 生成漂浮星光粒子
function createStar(){
const star = document.createElement('div');
star.className = 'star';
star.innerHTML = '✦';
star.style.left = Math.random()*100+'vw';
star.style.fontSize = Math.random()*18+6+'px';
star.style.color = ['#a8b8ff','#d0daff','#fff'][Math.floor(Math.random()*3)];
document.body.appendChild(star);
setTimeout(()=>star.remove(),12000);
}
setInterval(createStar,400);
// 鼠标跟随微光光点
document.addEventListener('mousemove',e=>{
let light = document.createElement('div');
light.style.position='fixed';
light.style.left=e.clientX+'px';
light.style.top=e.clientY+'px';
light.style.pointerEvents='none';
light.style.color='#a8b8ff';
light.innerText='✧';
light.style.fontSize='16px';
light.style.zIndex='9999';
document.body.appendChild(light);
setTimeout(()=>light.remove(),700);
})
// 2. 灵魂语录库
const wordList = [
"允许一切发生，允许自己不完美。",
"不必追赶月光，你本身就温柔发光。",
"内耗源于期待，自愈始于放下。",
"慢下来，灵魂才能跟上脚步。",
"世间万般苦难，都是心灵的修行。",
"不必所有人理解你，心安即是归处。",
"失眠的夜晚，是灵魂在和自己对话。",
"与自己和解，是一生最重要的课题。"
];
// 刷新短句
function refreshWord(){
let r = Math.floor(Math.random()*wordList.length);
document.getElementById('nowWord').innerText = wordList[r];
}
// 复制文案
function copyWord(){
let text = document.getElementById('nowWord').innerText;
navigator.clipboard.writeText(text).then(()=>alert("文案复制成功，送给内心疲惫的自己"));
}
// 生成语录海报画布
function makeWordPoster(){
let text = document.getElementById('nowWord').innerText;
let canvas = document.getElementById('wordCanvas');
canvas.width = 750;canvas.height = 1334;
let ctx = canvas.getContext('2d');
// 渐变星空背景
let grad = ctx.createLinearGradient(0,0,750,1334);
grad.addColorStop(0,"#0c101c");
grad.addColorStop(0.5,"#303f70");
grad.addColorStop(1,"#839cff");
ctx.fillStyle = grad;
ctx.fillRect(0,0,750,1334);
// 文字绘制自动换行
ctx.fillStyle = "#e8edf7";
ctx.font = "38px 思源宋体";
ctx.textAlign = "center";
let line = "";let y = 620;
for(let char of text){
let test = line + char;
if(ctx.measureText(test).width > 640){
ctx.fillText(line,375,y);
line = char;y += 72;
}else line = test;
}
ctx.fillText(line,375,y);
// 底部小字
ctx.font = "24px 思源宋体";
ctx.fillStyle = "#c0ccff";
ctx.fillText("灵魂渡 · 治愈心灵小站",375,1220);
// 下载图片
let a = document.createElement('a');
a.download = "灵魂治愈海报.png";
a.href = canvas.toDataURL("image/png");
a.click();
}
// 3. 背景音乐控制
const audio = document.getElementById('miniBgm');
function audioCtrl(){
if(audio.paused) audio.play();else audio.pause();
}
// 4. 明暗主题切换
function toggleTheme(){
document.body.classList.toggle('dark');
document.body.classList.toggle('light');
}
// 5. 本地访客计数（拓展功能）
function countVisit(){
let num = localStorage.getItem("soulVisitTotal") || 0;
num = Number(num)+1;
localStorage.setItem("soulVisitTotal",num);
document.getElementById("visitBox").innerText = "本站累计心灵访客："+num+" 位";
}
countVisit();
// 6. 读取全局自定义背景（素材页设置）
window.onload = function(){
let saveBg = localStorage.getItem("soulGlobalBg");
if(saveBg){
document.body.style.backgroundImage = `url(${saveBg})`;
document.body.style.backgroundSize = "cover";
document.body.style.backgroundAttachment = "fixed";
document.body.style.backgroundRepeat = "no-repeat";
}
}
</script>
