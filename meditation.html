<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"思源宋体",serif;}
body.dark{background:#0c101c;color:#e8edf7;}
body.light{background:#f7f9ff;color:#222940;}
.star{position:fixed;pointer-events:none;animation:starFloat 12s linear infinite;opacity:0.6;z-index:-1;}
@keyframes starFloat{
0%{transform:translateY(100vh) rotate(0deg);opacity:0;}
15%{opacity:1;}
85%{opacity:1;}
100%{transform:translateY(-10vh) rotate(360deg);opacity:0;}
}
.soul-title{
font-size:34px;font-weight:300;letter-spacing:5px;
color:#fff;
text-shadow:0 0 6px #a8b8ff,0 0 12px #839cff;
}
.broad{width:100%;height:36px;background:#b8c8ff;line-height:36px;overflow:hidden;}
.broad-text{white-space:nowrap;animation:broadRun 24s linear infinite;color:#0c101c;font-size:15px;}
@keyframes broadRun{0%{transform:translateX(100%);}100%{transform:translateX(-100%);}}
nav{width:100%;background:rgba(20,26,44,0.75);padding:16px 0;text-align:center;border-bottom:1px solid #839cff60;backdrop-filter:blur(6px);}
nav a{color:#d0daff;text-decoration:none;margin:0 14px;padding:9px 16px;border-radius:26px;transition:0.4s;font-size:16px;}
nav a:hover{background:#839cff;color:#0c101c;box-shadow:0 0 14px #839cff70;}
.box{width:92%;max-width:1250px;margin:32px auto;padding:28px;border-radius:20px;border:1px solid #839cff40;background:rgba(30,38,60,0.4);box-shadow:0 0 30px #627fff20;backdrop-filter:blur(4px);}
.box h2{margin-bottom:22px;color:#a8b8ff;border-left:4px solid #839cff;padding-left:12px;font-weight:400;}
.music-item{background:rgba(10,14,30,0.5);padding:14px;border-radius:12px;margin:10px 0;border:1px solid #839cff30;cursor:pointer;transition:0.3s;}
.music-item:hover{background:rgba(131,156,255,0.2);}
.btn{display:inline-block;padding:11px 24px;background:linear-gradient(45deg,#839cff,#627fff);color:#0c101c;border:none;border-radius:32px;font-weight:500;cursor:pointer;margin:10px;transition:0.35s;font-size:15px;}
.btn:hover{transform:scale(1.04);box-shadow:0 0 18px #839cff80;}
.theme-switch{position:fixed;top:18px;right:20px;z-index:999;}
footer{margin-top:60px;padding:24px;text-align:center;color:#949fc7;font-size:14px;border-top:1px solid #839cff25;}
</style>
</head>

</div>

<div class="box">
<h2>正在播放</h2>
<p id="nowMusicName" style="font-size:20px;color:#c0ccff;margin:15px 0;">星空治愈纯音1</p>
<audio id="audioPlayer" controls style="width:100%;margin:10px 0;">
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3">

<div>
<button class="btn" onclick="prevMusic()">上一曲</button>
<button class="btn" onclick="playToggle()">播放/暂停</button>
<button class="btn" onclick="nextMusic()">下一曲</button>
<button class="btn" onclick="loopToggle()">循环播放</button>
</div>
</div>
<div class="box">
<h2>全部治愈歌单</h2>
<div id="musicListBox"></div>
</div>
<footer>灵魂渡治愈小站 © 2026</footer>
<script>
const musicData = [
{name:"星空治愈纯音1",src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3"},
{name:"雨夜白噪音",src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3"},
{name:"山间薄雾钢琴",src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-7.mp3"},
{name:"晚风舒缓旋律",src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3"},
{name:"深夜冥想轻音乐",src:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-9.mp3"}
];
let currentIndex = 0;
let loopStatus = false;
const player = document.getElementById("audioPlayer");
const nameBox = document.getElementById("nowMusicName");

function renderMusicList(){
    const box = document.getElementById("musicListBox");
    box.innerHTML = "";
    musicData.forEach((item,i)=>{
        let div = document.createElement("div");
        div.className = "music-item";
        div.innerText = item.name;
        div.onclick = ()=>playMusic(i);
        box.appendChild(div);
    })
}

function playMusic(idx){
    currentIndex = idx;
    player.src = musicData[idx].src;
    nameBox.innerText = musicData[idx].name;
    player.play();
}
function playToggle(){
    if(player.paused) player.play();
    else player.pause();
}
function nextMusic(){
    currentIndex = (currentIndex + 1) % musicData.length;
    playMusic(currentIndex);
}
function prevMusic(){
    currentIndex = (currentIndex - 1 + musicData.length) % musicData.length;
    playMusic(currentIndex);
}
function loopToggle(){
    loopStatus = !loopStatus;
    player.loop = loopStatus;
    alert(loopStatus ? "已开启循环播放" : "关闭循环");
}
player.addEventListener("ended",()=>{
    if(!loopStatus) nextMusic();
})

// 星光粒子
function createStar(){
const star = document.createElement('div');
star.className = 'star';
star.innerHTML = '✦';
star.style.left = Math.random()*100+'vw';
star.style.fontSize = Math.random()*18+6+'px';
star.style.color = ['#a8b8ff','#d0daff','#fff'][Math.floor(Math.random()*3)];
document.body.appendChild(star);
setTimeout(()=>star.remove(),12000);
}
setInterval(createStar,400);
function toggleTheme(){
document.body.classList.toggle('dark');
document.body.classList.toggle('light');
}
window.onload = function(){
renderMusicList();
let saveBg = localStorage.getItem("soulGlobalBg");
if(saveBg){
document.body.style.backgroundImage = `url(${saveBg})`;
document.body.style.backgroundSize = "cover";
document.body.style.backgroundAttachment = "fixed";
document.body.style.backgroundRepeat = "no-repeat";
}
}
</script>
</body>
