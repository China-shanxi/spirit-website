<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>动态背景素材｜灵魂渡</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"思源宋体",serif;}
body.dark{background:#0c101c;color:#e8edf7;}
body.light{background:#f7f9ff;color:#222940;}
.star{position:fixed;pointer-events:none;animation:starFloat 12s linear infinite;opacity:0.6;z-index:-1;}
@keyframes starFloat{
0%{transform:translateY(100vh) rotate(0deg);opacity:0;}
15%{opacity:1;}
85%{opacity:1;}
100%{transform:translateY(-10vh) rotate(360deg);opacity:0;}
}
.soul-title{
font-size:34px;font-weight:300;letter-spacing:5px;
color:#fff;
text-shadow:0 0 6px #a8b8ff,0 0 12px #839cff;
}
.broad{width:100%;height:36px;background:#b8c8ff;line-height:36px;overflow:hidden;}
.broad-text{white-space:nowrap;animation:broadRun 24s linear infinite;color:#0c101c;font-size:15px;}
@keyframes broadRun{0%{transform:translateX(100%);}100%{transform:translateX(-100%);}}
nav{width:100%;background:rgba(20,26,44,0.75);padding:16px 0;text-align:center;border-bottom:1px solid #839cff60;backdrop-filter:blur(6px);}
nav a{color:#d0daff;text-decoration:none;margin:0 14px;padding:9px 16px;border-radius:26px;transition:0.4s;font-size:16px;}
nav a:hover{background:#839cff;color:#0c101c;box-shadow:0 0 14px #839cff70;}
.box{width:92%;max-width:1250px;margin:32px auto;padding:28px;border-radius:20px;border:1px solid #839cff40;background:rgba(30,38,60,0.4);box-shadow:0 0 30px #627fff20;backdrop-filter:blur(4px);}
.box h2{margin-bottom:22px;color:#a8b8ff;border-left:4px solid #839cff;padding-left:12px;font-weight:400;}
.mat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:22px;}
.mat-card{background:rgba(10,14,30,0.5);padding:16px;border-radius:14px;text-align:center;border:1px solid #839cff30;}
.mat-card img{width:100%;height:170px;object-fit:cover;border-radius:12px;}
.btn{display:inline-block;padding:11px 24px;background:linear-gradient(45deg,#839cff,#627fff);color:#0c101c;border:none;border-radius:32px;font-weight:500;cursor:pointer;margin:8px;transition:0.35s;font-size:14px;}
.btn:hover{transform:scale(1.04);box-shadow:0 0 18px #839cff80;}
.theme-switch{position:fixed;top:18px;right:20px;z-index:999;}
footer{margin-top:60px;padding:24px;text-align:center;color:#949fc7;font-size:14px;border-top:1px solid #839cff25;}
</style>
</head>
<body class="dark">
<div class="theme-switch">
<button class="btn" onclick="toggleTheme()">切换静谧/温柔模式</button>
</div>
<div class="broad">
<div class="broad-text">动态GIF背景素材｜流星/星空/薄雾流云｜一键下载｜设置全站全局背景，全部页面同步生效</div>
</div>
<div style="text-align:center;margin:30px 0;">
<h1 class="soul-title">治愈动态背景素材库</h1>
<p style="color:#c0ccff;margin-top:10px;letter-spacing:2px;">更换属于你的温柔页面底色</p>
</div>
<nav>

<a href="soulWords.html">灵魂语录</a>

<a href="matchSoul.html">氛围感好物</a>
</nav>
<div class="box">
<h2>动态GIF背景列表</h2>
<div class="mat-grid" id="gifBox"></div>
</div>
<footer>灵魂渡治愈小站 © 2026 | 设置背景后刷新页面全局生效</footer>
<script>
const gifList = [
{src:"https://picsum.photos/id/1019/300/300",name:"流动星空GIF"},
{src:"https://picsum.photos/id/1036/300/300",name:"山间薄雾流云"},
{src:"https://picsum.photos/id/1043/300/300",name:"海边晚风渐变"},
{src:"https://picsum.photos/id/1068/300/300",name:"漫天流星动态"},
{src:"https://picsum.photos/id/1023/300/300",name:"淡紫柔光薄雾"},
{src:"https://picsum.photos/id/1056/300/300",name:"深夜深海微光"}
];
// 渲染素材
function renderGif(){
    const box = document.getElementById("gifBox");
    box.innerHTML = "";
    gifList.forEach(item=>{
        let card = document.createElement("div");
        card.className = "mat-card";
        card.innerHTML = `
            <img src="${item.src}">
            <p style="color:#c0ccff;margin:10px 0;">${item.name}</p>
            <button class="btn" onclick="downloadMat('${item.src}','${item.name}')">下载</button>
            <button class="btn" onclick="setGlobalBg('${item.src}')">设为全局背景</button>
        `;
        box.appendChild(card);
    })
}
// 下载素材
function downloadMat(src,name){
    const a = document.createElement("a");
    a.href = src;
    a.download = name+".jpg";
    a.click();
}
// 设置全站背景
function setGlobalBg(url){
    localStorage.setItem("soulGlobalBg",url);
    document.body.style.backgroundImage = `url(${url})`;
    document.body.style.backgroundSize = "cover";
    document.body.style.backgroundAttachment = "fixed";
    document.body.style.backgroundRepeat = "no-repeat";
    alert("全局背景设置完成，所有页面同步生效！");
}
// 读取本地保存背景
function loadSavedBg(){
    const saveBg = localStorage.getItem("soulGlobalBg");
    if(saveBg){
        document.body.style.backgroundImage = `url(${saveBg})`;
        document.body.style.backgroundSize = "cover";
        document.body.style.backgroundAttachment = "fixed";
        document.body.style.backgroundRepeat = "no-repeat";
    }
}

// 星光粒子
function createStar(){
const star = document.createElement('div');
star.className = 'star';
star.innerHTML = '✦';
star.style.left = Math.random()*100+'vw';
star.style.fontSize = Math.random()*18+6+'px';
star.style.color = ['#a8b8ff','#d0daff','#fff'][Math.floor(Math.random()*3)];
document.body.appendChild(star);
setTimeout(()=>star.remove(),12000);
}
setInterval(createStar,400);
function toggleTheme(){
document.body.classList.toggle('dark');
document.body.classList.toggle('light');
}
window.onload = function(){
loadSavedBg();
renderGif();
}
</script>
</body>
</html>
